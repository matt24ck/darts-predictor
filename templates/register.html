{% extends "base.html" %}
{% block title %}Sign Up - Darts Value Betting{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card standalone">
            <h2 class="text-center mb-4">Create Account</h2>
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required autofocus>
                </div>
                <div class="form-group">
                    <label for="display_name">Display Name (optional)</label>
                    <input type="text" id="display_name" name="display_name" class="form-control"
                           placeholder="How you'll appear on the site">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           required minlength="6">
                    <small class="form-hint">At least 6 characters</small>
                </div>
                <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
            <p class="text-center mt-3" style="font-size: 0.9rem;">
                Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
